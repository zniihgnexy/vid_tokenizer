type: HiNeRV
config:
  base_encoding:
    base_grid_type: v2
    base_grid_size: [-1, -1, -1, 2]
    base_grid_level: 2
    base_grid_level_scale: [1., 1., 1., 0.5]
    base_kernel: [1, 3, 3]
  decoder:
    channels: [16, 8]
    depths: [1, 1]
    exps: [2., 2.]
    kernels: [3, 3]
    scales_t: [1, 1]
    scales_hw: [2, 2]
    paddings: [-1, -1, -1]
    block_type: [convnext, convnext]
    block_norm: [layernorm-no-affine, layernorm-no-affine]
    block_act: [gelu, gelu]
    upsample_type: [trilinear, trilinear]
    upsample_config: [matmul-th-w, matmul-th-w]
    upsample_norm: [layernorm-no-affine, layernorm-no-affine]
    upsample_act: [none, none]
    use_hi_encoding: [true, true]
    local_grid_size: [-1, 2]
    local_grid_level: 1
